name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run validate
        env:
          NODE_ENV: test
      - run: npm run audit
      - run: git diff --check
      - run: npm run benchmark:offline
      - uses: actions/upload-artifact@v4
        with:
          name: offline-benchmark
          path: evidence/performance/offline-benchmark.json

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: docker build --pull -t crawling-neogrid:ci .
      - run: docker run --rm crawling-neogrid:ci --help
      - run: docker run --rm crawling-neogrid:ci --version
      - run: test "$(docker run --rm --entrypoint id crawling-neogrid:ci -u)" != "0"
      - name: Validate intentionally invalid fixture
        run: |
          set +e
          docker run --rm -v "$PWD/tests/fixtures:/app/input:ro" crawling-neogrid:ci validate-input --input /app/input/sample-input.txt
          exit_code=$?
          set -e
          test "$exit_code" -eq 2

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t crawling-neogrid:scan .
      - uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: crawling-neogrid:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - uses: anchore/sbom-action@v0
        with:
          image: crawling-neogrid:scan
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
